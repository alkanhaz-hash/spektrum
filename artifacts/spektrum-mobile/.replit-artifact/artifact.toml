kind = "mobile"
previewPath = "/spektrum-mobile/"
title = "SPEKTRUM Mobil"
version = "1.0.0"
id = "artifacts/spektrum-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/spektrum-mobile/" ]
localPort = 24811

[services.development]
run = "pnpm --filter @workspace/spektrum-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spektrum-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/spektrum-mobile", "run", "serve" ]

[services.env]
PORT = "24811"
BASE_PATH = "/spektrum-mobile/"
