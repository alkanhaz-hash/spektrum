name: Keystore Üret (Bir Kez Çalıştır)

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore şifresi (aklında kal!)'
        required: true
        type: string

jobs:
  generate:
    name: Keystore Üret
    runs-on: ubuntu-latest
    steps:
      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Keystore üret
        run: |
          keytool -genkey -v \
            -keystore spektrum-release.jks \
            -alias spektrum \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.keystore_password }}" \
            -dname "CN=SPEKTRUM, OU=Mobile, O=Alkanhaz, L=Istanbul, ST=Istanbul, C=TR"

      - name: Base64 çevir ve kaydet
        run: |
          base64 -w0 spektrum-release.jks > spektrum-release-base64.txt
          echo ""
          echo "=== KEYSTORE BASE64 (GitHub Secret olarak ekle) ==="
          cat spektrum-release-base64.txt
          echo ""
          echo "=== BİTTİ ==="

      - name: Base64 dosyasını artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: spektrum-release-base64.txt
          retention-days: 1
