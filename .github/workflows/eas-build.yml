name: EAS Build (Android)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profili'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: pnpm kur
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK + NDK kur
        uses: android-actions/setup-android@v3

      - name: NDK 27 kur
        run: sdkmanager "ndk;27.1.12297006"

      - name: Bağımlılıkları yükle
        run: pnpm install --no-frozen-lockfile

      - name: Lib paketleri derle
        run: pnpm run typecheck:libs

      - name: Expo prebuild (Android native kod üret)
        working-directory: artifacts/spektrum-mobile
        run: pnpm exec expo prebuild --platform android --non-interactive --clean --no-install
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_API_BASE: ${{ secrets.EXPO_PUBLIC_API_BASE }}

      - name: local.properties oluştur
        run: |
          echo "sdk.dir=$ANDROID_HOME" > artifacts/spektrum-mobile/android/local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/27.1.12297006" >> artifacts/spektrum-mobile/android/local.properties
          echo "NODE_BINARY=$(which node)" >> artifacts/spektrum-mobile/android/gradle.properties

      - name: APK derle (Gradle)
        working-directory: artifacts/spektrum-mobile/android
        run: |
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" 2>&1 | tee /tmp/gradle.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== HATA ÖZETI ==="
            grep -n "FAILED\|error:\|> Task\|Caused by\|Could not" /tmp/gradle.log | grep -v "warning\|deprecated" | head -60
            exit $EXIT_CODE
          fi
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: spektrum-${{ github.event.inputs.profile }}
          path: artifacts/spektrum-mobile/android/app/build/outputs/apk/debug/app-debug.apk
