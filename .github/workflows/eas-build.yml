name: EAS Build (Android)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profili'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: pnpm kur
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK + NDK kur
        uses: android-actions/setup-android@v3

      - name: NDK 27 kur
        run: sdkmanager "ndk;27.1.12297006"

      - name: Bağımlılıkları yükle
        run: pnpm install --no-frozen-lockfile

      - name: Lib paketleri derle
        run: pnpm run typecheck:libs

      - name: Expo prebuild (Android native kod üret)
        working-directory: artifacts/spektrum-mobile
        run: pnpm exec expo prebuild --platform android --non-interactive --clean --no-install
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_API_BASE: ${{ secrets.EXPO_PUBLIC_API_BASE }}

      - name: local.properties oluştur
        run: |
          echo "sdk.dir=$ANDROID_HOME" > artifacts/spektrum-mobile/android/local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/27.1.12297006" >> artifacts/spektrum-mobile/android/local.properties
          echo "NODE_BINARY=$(which node)" >> artifacts/spektrum-mobile/android/gradle.properties
          sed -i 's/kotlinVersion = "1\.9\.25"/kotlinVersion = "2.1.21"/g' artifacts/spektrum-mobile/android/build.gradle

      - name: Keystore oluştur (production)
        if: ${{ github.event.inputs.profile == 'production' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/spektrum-release.jks

      - name: AAB derle — Production (imzalı)
        if: ${{ github.event.inputs.profile == 'production' }}
        working-directory: artifacts/spektrum-mobile/android
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_API_BASE: ${{ secrets.EXPO_PUBLIC_API_BASE }}
        run: |
          ./gradlew bundleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx4g" \
            -Pandroid.injected.signing.store.file=/tmp/spektrum-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            2>&1 | tee /tmp/gradle.log; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: APK derle — Preview (debug)
        if: ${{ github.event.inputs.profile == 'preview' }}
        working-directory: artifacts/spektrum-mobile/android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" 2>&1 | tee /tmp/gradle.log; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Gradle logunu yükle
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log

      - name: Hata varsa fail et
        run: |
          if grep -q "BUILD FAILED" /tmp/gradle.log; then
            echo "====== HATA BAŞLANGIÇ ======"
            grep -A5 "What went wrong\|Execution failed\|Caused by\|error:\|Error:" /tmp/gradle.log | head -120
            echo ""
            echo "====== METRO / NODE HATA DETAYI ======"
            grep -A10 "createBundle\|Metro\|SyntaxError\|Cannot find\|Unable to resolve\|Module not found\|ENOENT\|node.*exit\|non-zero" /tmp/gradle.log | head -100
            echo ""
            echo "====== SON 60 SATIR ======"
            tail -60 /tmp/gradle.log
            echo "====== HATA BİTİŞ ======"
            exit 1
          fi

      - name: APK kaydet (preview)
        if: ${{ github.event.inputs.profile == 'preview' }}
        uses: actions/upload-artifact@v4
        with:
          name: spektrum-preview-apk
          path: artifacts/spektrum-mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: AAB kaydet (production)
        if: ${{ github.event.inputs.profile == 'production' }}
        uses: actions/upload-artifact@v4
        with:
          name: spektrum-production-aab
          path: artifacts/spektrum-mobile/android/app/build/outputs/bundle/release/app-release.aab
